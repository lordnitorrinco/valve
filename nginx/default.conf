# ── Rate limiting zones ───────────────────────────────────────
# API endpoints: generous enough for integration tests + burst traffic; excess → 429 (not 503)
limit_req_zone $binary_remote_addr zone=api_limit:10m rate=120r/m;
limit_req_status 429;
# Static assets: 60 requests/minute per IP
limit_req_zone $binary_remote_addr zone=general_limit:10m rate=60r/m;
# Health checks: very high ceiling (monitoring tools poll often)
limit_req_zone $binary_remote_addr zone=health_limit:1m rate=1000r/s;

# ── Bot detection ─────────────────────────────────────────────
# Block known security scanners and automated tools
map $http_user_agent $bad_agent {
    default 0;
    ~*(?:sqlmap|nikto|nmap|masscan|havij|w3af|nessus|acunetix) 1;
    ~*(?:python-requests/|Go-http-client|Java/|libwww-perl) 1;
}

# ── Upstream definitions ─────────────────────────────────────
upstream php_backend {
    server backend:9000;
}

upstream frontend_server {
    server frontend:80;
}

# ── API server (port 80) ─────────────────────────────────────
# Handles /api/* requests by proxying to PHP-FPM
server {
    listen 80;
    server_name _;
    server_tokens off;  # Hide Nginx version from responses

    # Compress JSON responses (health probes, API errors)
    gzip            on;
    gzip_proxied    any;
    gzip_types      application/json;
    gzip_min_length 64;

    # Aggressive timeouts to limit slow-loris attacks
    client_max_body_size 15M;
    client_body_timeout 10s;
    client_header_timeout 10s;
    send_timeout 10s;
    keepalive_timeout 15s;
    large_client_header_buffers 4 8k;

    # Block malicious user agents
    if ($bad_agent) { return 403; }
    # Only allow safe HTTP methods
    if ($request_method !~ ^(GET|POST|OPTIONS)$) { return 405; }

    # Security headers (applied to all API responses)
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

    # Correlate gateway logs with PHP security logs (also forwarded to FastCGI)
    add_header X-Request-ID $request_id always;

    # Block access to sensitive files
    location ~ /\.(env|git|htaccess|htpasswd) { return 404; }
    location ~ (docker-compose|Dockerfile|Makefile) { return 404; }

    location = /api/health {
        limit_req zone=health_limit burst=500 nodelay;

        fastcgi_pass  php_backend;
        fastcgi_index index.php;
        fastcgi_param SCRIPT_FILENAME /var/www/html/index.php;
        include       fastcgi_params;
        fastcgi_param REQUEST_URI $request_uri;
        fastcgi_param HTTP_X_REQUEST_ID $request_id;
    }

    # API routes → PHP-FPM via FastCGI
    location /api/ {
        limit_req zone=api_limit burst=10 nodelay;

        fastcgi_pass  php_backend;
        fastcgi_index index.php;
        fastcgi_param SCRIPT_FILENAME /var/www/html/index.php;
        include       fastcgi_params;
        fastcgi_param REQUEST_URI $request_uri;
        fastcgi_param HTTP_X_REQUEST_ID $request_id;
    }

    # All other paths on the API port return 404
    location / {
        return 404;
    }
}

# ── Frontend server (port 8080) ──────────────────────────────
# Serves static assets and proxies /api/* to the backend
server {
    listen 8080;
    server_name _;
    server_tokens off;

    client_max_body_size 15M;
    client_body_timeout 10s;
    client_header_timeout 10s;
    send_timeout 10s;
    keepalive_timeout 15s;
    large_client_header_buffers 4 8k;

    if ($bad_agent) { return 403; }
    if ($request_method !~ ^(GET|POST|OPTIONS)$) { return 405; }

    # Enable gzip compression for static assets
    gzip            on;
    gzip_proxied    any;
    gzip_types      text/plain text/css application/javascript application/json image/svg+xml;
    gzip_min_length 256;

    # Comprehensive security headers
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    # CSP: only allow scripts/styles from self and Google Fonts
    add_header Content-Security-Policy "default-src 'self'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src https://fonts.gstatic.com; img-src 'self' data:; script-src 'self'" always;

    add_header X-Request-ID $request_id always;

    # Block sensitive files
    location ~ /\.(env|git|htaccess|htpasswd) { return 404; }
    location ~ (docker-compose|Dockerfile|Makefile) { return 404; }

    location = /api/health {
        limit_req zone=health_limit burst=500 nodelay;

        fastcgi_pass  php_backend;
        fastcgi_index index.php;
        fastcgi_param SCRIPT_FILENAME /var/www/html/index.php;
        include       fastcgi_params;
        fastcgi_param REQUEST_URI $request_uri;
        fastcgi_param HTTP_X_REQUEST_ID $request_id;
    }

    # API requests from frontend → PHP-FPM backend
    location /api/ {
        limit_req zone=api_limit burst=10 nodelay;

        fastcgi_pass  php_backend;
        fastcgi_index index.php;
        fastcgi_param SCRIPT_FILENAME /var/www/html/index.php;
        include       fastcgi_params;
        fastcgi_param REQUEST_URI $request_uri;
        fastcgi_param HTTP_X_REQUEST_ID $request_id;
    }

    # Static files → frontend container
    location / {
        limit_req zone=general_limit burst=20 nodelay;

        proxy_pass http://frontend_server;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
