limit_req_zone $binary_remote_addr zone=api_limit:10m rate=10r/m;
limit_req_zone $binary_remote_addr zone=general_limit:10m rate=30r/m;

map $http_user_agent $bad_agent {
    default 0;
    ~*(?:sqlmap|nikto|nmap|masscan|havij|w3af|nessus|acunetix) 1;
    ~*(?:python-requests/|Go-http-client|Java/|libwww-perl) 1;
}

upstream php_backend {
    server backend:9000;
}

upstream frontend_server {
    server frontend:80;
}

# ── API (puerto 80) ─────────────────────────────────────────
server {
    listen 80;
    server_name _;
    server_tokens off;

    client_max_body_size 15M;
    client_body_timeout 10s;
    client_header_timeout 10s;
    send_timeout 10s;
    keepalive_timeout 15s;
    large_client_header_buffers 4 8k;

    if ($bad_agent) { return 403; }
    if ($request_method !~ ^(GET|POST|OPTIONS)$) { return 405; }

    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

    location ~ /\.(env|git|htaccess|htpasswd) { return 404; }
    location ~ (docker-compose|Dockerfile|Makefile) { return 404; }

    location /api/ {
        limit_req zone=api_limit burst=5 nodelay;

        fastcgi_pass  php_backend;
        fastcgi_index index.php;
        fastcgi_param SCRIPT_FILENAME /var/www/html/index.php;
        include       fastcgi_params;
        fastcgi_param REQUEST_URI $request_uri;
    }

    location / {
        return 404;
    }
}

# ── Frontend (puerto 8080) ──────────────────────────────────
server {
    listen 8080;
    server_name _;
    server_tokens off;

    client_max_body_size 15M;
    client_body_timeout 10s;
    client_header_timeout 10s;
    send_timeout 10s;
    keepalive_timeout 15s;
    large_client_header_buffers 4 8k;

    if ($bad_agent) { return 403; }
    if ($request_method !~ ^(GET|POST|OPTIONS)$) { return 405; }

    gzip            on;
    gzip_proxied    any;
    gzip_types      text/plain text/css application/javascript application/json image/svg+xml;
    gzip_min_length 256;

    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header Content-Security-Policy "default-src 'self'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src https://fonts.gstatic.com; img-src 'self' data:; script-src 'self'" always;

    location ~ /\.(env|git|htaccess|htpasswd) { return 404; }
    location ~ (docker-compose|Dockerfile|Makefile) { return 404; }

    location /api/ {
        limit_req zone=api_limit burst=5 nodelay;

        fastcgi_pass  php_backend;
        fastcgi_index index.php;
        fastcgi_param SCRIPT_FILENAME /var/www/html/index.php;
        include       fastcgi_params;
        fastcgi_param REQUEST_URI $request_uri;
    }

    location / {
        limit_req zone=general_limit burst=20 nodelay;

        proxy_pass http://frontend_server;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
