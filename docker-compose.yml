# Docker Compose orchestration for the Evolve Academy admission form.
#
# Architecture:
#   Browser → Nginx (gateway) → Frontend (static) | Backend (PHP-FPM) → MySQL
#
# All containers run with security hardening:
#   - read_only filesystems (where possible)
#   - dropped Linux capabilities (cap_drop: ALL)
#   - no-new-privileges security option
#   - memory and CPU limits

services:

  # ── MySQL 8.0 database ─────────────────────────────────────
  # Stores submissions (with encrypted PII) and rate limit records.
  # Port 3306 is NOT exposed to the host — only accessible internally.
  db:
    image: mysql:8.0
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
      MYSQL_DATABASE:      ${DB_NAME}
      MYSQL_USER:          ${DB_USER}
      MYSQL_PASSWORD:      ${DB_PASSWORD}
    volumes:
      - db_data:/var/lib/mysql
      - ./mysql/init.sql:/docker-entrypoint-initdb.d/init.sql:ro  # Schema + permissions
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 5s
      timeout: 3s
      retries: 20
    security_opt:
      - no-new-privileges:true
    mem_limit: 512m
    cpus: 1.0

  # ── PHP-FPM API backend ────────────────────────────────────
  # Handles /api/* requests via FastCGI. Read-only filesystem
  # with tmpfs for writable directories (logs, temp, pid files).
  backend:
    build: ./backend
    restart: unless-stopped
    environment:
      DB_HOST:                   db
      DB_NAME:                   ${DB_NAME}
      DB_USER:                   ${DB_USER}
      DB_PASS:                   ${DB_PASSWORD}
      ENCRYPTION_KEY:            ${ENCRYPTION_KEY}
      CSRF_SECRET:               ${CSRF_SECRET}
      ALLOWED_ORIGIN:            ${ALLOWED_ORIGIN}
      RATE_LIMIT_MAX:            ${RATE_LIMIT_MAX}
      RATE_LIMIT_WINDOW_MINUTES: ${RATE_LIMIT_WINDOW_MINUTES}
      FORWARD_WEBHOOK_ENABLED:   ${FORWARD_WEBHOOK_ENABLED}
      FORWARD_WEBHOOK_URL:       ${FORWARD_WEBHOOK_URL}
    volumes:
      - uploads:/var/www/uploads  # Persistent CV file storage
    depends_on:
      db:
        condition: service_healthy
    read_only: true                # Immutable filesystem
    tmpfs:
      - /tmp:size=64M              # PHP temp files
      - /var/run:size=1M           # PID files
      - /var/log:size=16M          # Error logs
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL                        # Drop all Linux capabilities
    cap_add:
      - CHOWN                      # Required by PHP-FPM
      - SETGID
      - SETUID
      - DAC_OVERRIDE
    mem_limit: 256m
    cpus: 0.5

  # ── Frontend static server (internal Nginx) ────────────────
  # Serves HTML/CSS/JS. Not directly exposed — the gateway
  # Nginx reverse proxy forwards requests here.
  frontend:
    build: ./frontend
    restart: unless-stopped
    read_only: true
    tmpfs:
      - /var/cache/nginx:size=16M
      - /var/run:size=1M
      - /tmp:size=16M
      - /var/log/nginx:size=8M
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - SETGID
      - SETUID
      - NET_BIND_SERVICE            # Required to bind port 80
    mem_limit: 128m
    cpus: 0.25

  # ── phpMyAdmin (development / evaluation only) ─────────────
  # Provides a web UI to inspect the database contents.
  # Connects internally to MySQL — does not expose the DB port.
  phpmyadmin:
    image: phpmyadmin:5
    restart: unless-stopped
    ports:
      - "${PMA_PORT:-8081}:80"      # Accessible at localhost:8081
    environment:
      PMA_HOST: db
      PMA_USER: root
      PMA_PASSWORD: ${DB_ROOT_PASSWORD}
    depends_on:
      db:
        condition: service_healthy
    security_opt:
      - no-new-privileges:true
    mem_limit: 128m
    cpus: 0.25

  # ── Nginx gateway (reverse proxy) ─────────────────────────
  # Single entry point for all external traffic:
  #   - Port 80:   API requests → backend (FastCGI)
  #   - Port 8080: Frontend requests → frontend container
  # Applies rate limiting, security headers, and bot blocking.
  nginx:
    build: ./nginx
    restart: unless-stopped
    ports:
      - "${API_PORT:-80}:80"
      - "${FRONTEND_PORT:-8080}:8080"
    depends_on:
      - backend
      - frontend
    read_only: true
    tmpfs:
      - /var/cache/nginx:size=16M
      - /var/run:size=1M
      - /tmp:size=16M
      - /var/log/nginx:size=8M
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - SETGID
      - SETUID
      - NET_BIND_SERVICE
    mem_limit: 128m
    cpus: 0.25

# Named volumes for persistent data
volumes:
  db_data:    # MySQL data directory
  uploads:    # Uploaded CV files
