services:

  # ── Base de datos ──────────────────────────────────────────
  db:
    image: mysql:8.0
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
      MYSQL_DATABASE:      ${DB_NAME}
      MYSQL_USER:          ${DB_USER}
      MYSQL_PASSWORD:      ${DB_PASSWORD}
    volumes:
      - db_data:/var/lib/mysql
      - ./mysql/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 5s
      timeout: 3s
      retries: 20
    security_opt:
      - no-new-privileges:true
    mem_limit: 512m
    cpus: 1.0

  # ── API backend (PHP-FPM) ─────────────────────────────────
  backend:
    build: ./backend
    restart: unless-stopped
    environment:
      DB_HOST:                   db
      DB_NAME:                   ${DB_NAME}
      DB_USER:                   ${DB_USER}
      DB_PASS:                   ${DB_PASSWORD}
      ENCRYPTION_KEY:            ${ENCRYPTION_KEY}
      CSRF_SECRET:               ${CSRF_SECRET}
      ALLOWED_ORIGIN:            ${ALLOWED_ORIGIN}
      RATE_LIMIT_MAX:            ${RATE_LIMIT_MAX}
      RATE_LIMIT_WINDOW_MINUTES: ${RATE_LIMIT_WINDOW_MINUTES}
      FORWARD_WEBHOOK_ENABLED:   ${FORWARD_WEBHOOK_ENABLED}
      FORWARD_WEBHOOK_URL:       ${FORWARD_WEBHOOK_URL}
    volumes:
      - uploads:/var/www/uploads
    depends_on:
      db:
        condition: service_healthy
    read_only: true
    tmpfs:
      - /tmp:size=64M
      - /var/run:size=1M
      - /var/log:size=16M
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - SETGID
      - SETUID
      - DAC_OVERRIDE
    mem_limit: 256m
    cpus: 0.5

  # ── Frontend (Nginx estático) ─────────────────────────────
  frontend:
    build: ./frontend
    restart: unless-stopped
    read_only: true
    tmpfs:
      - /var/cache/nginx:size=16M
      - /var/run:size=1M
      - /tmp:size=16M
      - /var/log/nginx:size=8M
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - SETGID
      - SETUID
      - NET_BIND_SERVICE
    mem_limit: 128m
    cpus: 0.25

  # ── phpMyAdmin (solo desarrollo / evaluación) ────────────
  phpmyadmin:
    image: phpmyadmin:5
    restart: unless-stopped
    ports:
      - "${PMA_PORT:-8081}:80"
    environment:
      PMA_HOST: db
      PMA_USER: root
      PMA_PASSWORD: ${DB_ROOT_PASSWORD}
    depends_on:
      db:
        condition: service_healthy
    security_opt:
      - no-new-privileges:true
    mem_limit: 128m
    cpus: 0.25

  # ── Reverse proxy (Nginx gateway) ────────────────────────
  nginx:
    build: ./nginx
    restart: unless-stopped
    ports:
      - "${API_PORT:-80}:80"
      - "${FRONTEND_PORT:-8080}:8080"
    depends_on:
      - backend
      - frontend
    read_only: true
    tmpfs:
      - /var/cache/nginx:size=16M
      - /var/run:size=1M
      - /tmp:size=16M
      - /var/log/nginx:size=8M
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - SETGID
      - SETUID
      - NET_BIND_SERVICE
    mem_limit: 128m
    cpus: 0.25

volumes:
  db_data:
  uploads:
