# Frontend Nginx configuration (internal container).
# Serves static HTML/CSS/JS files. Not directly exposed —
# the gateway Nginx proxy forwards requests here.

server {
    listen 80;
    server_name _;
    server_tokens off;  # Hide Nginx version
    root /usr/share/nginx/html;
    index index.html;

    # SPA fallback: serve index.html for all routes
    location / {
        try_files $uri $uri/ /index.html;
    }
}
