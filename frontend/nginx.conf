# Frontend Nginx configuration (internal container).
# Serves static HTML/CSS/JS files. Not directly exposed —
# the gateway Nginx proxy forwards requests here.

server {
    listen 80;
    server_name _;
    server_tokens off;  # Hide Nginx version
    root /usr/share/nginx/html;
    index index.html;

    # Compress text assets (HTML/CSS/JS/SVG)
    gzip            on;
    gzip_proxied    any;
    gzip_types      text/plain text/css application/javascript application/json image/svg+xml;
    gzip_min_length 256;

    # Strong caching for fingerprint-free assets; ETag allows conditional GET
    etag on;
    location ~* \.(css|js|svg|woff2?)$ {
        expires 1h;
        add_header Cache-Control "public, max-age=3600";
        try_files $uri =404;
    }

    # SPA fallback: serve index.html for all routes
    location / {
        try_files $uri $uri/ /index.html;
    }
}
